events {
    worker_connections 1024;
}

http {
    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;
    
    # 服务器配置
    server {
        listen 70;
        server_name localhost;
        
        # 健康检查端点
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # 默认页面
        location / {
            return 200 "MCP Nginx Proxy Server\nAvailable containers:\n";
        }

        # 容器 befcb3a2cbae 的代理配置 (映射自端口 7000)
        location /befcb3a2cbae/ {
            proxy_pass http://127.0.0.1:7000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 支持WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # 容器 befcb3a2cbae 的直接MCP路径
        location /befcb3a2cbae/mcp {
            proxy_set_header Host $host;
            proxy_pass http://127.0.0.1:7000/mcp;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 支持WebSocket和SSE
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }
        
        # 容器 befcb3a2cbae 的文件上传路径
        location /befcb3a2cbae/upload {
            proxy_pass http://127.0.0.1:777/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时设置（文件上传可能需要更长时间）
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # 支持大文件上传
            client_max_body_size 100M;
        }

        # 容器 befcb3a2cbae 的文件下载路径
        location /befcb3a2cbae/download/ {
            rewrite ^/befcb3a2cbae/download/(.*)$ /download/$1 break;
            proxy_pass http://127.0.0.1:777;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }

        # 容器 befcb3a2cbae 的Notebook根路径重定向
        location = /befcb3a2cbae/notebook {
            return 302 /befcb3a2cbae/notebook/;
        }
        
        # 容器 befcb3a2cbae 的Notebook静态资源路径
        location ~ /befcb3a2cbae/notebook/(static|custom|nbextensions)/ {
            rewrite ^/befcb3a2cbae/notebook/(.*)$ /notebook/$1 break;
            proxy_pass http://127.0.0.1:7777;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 静态资源优化
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            
            # 缓存设置
            expires 1d;
            add_header Cache-Control "public, immutable";
            
            # 确保内容不被修改
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        # 容器 befcb3a2cbae 的Notebook API路径
        location ~ /befcb3a2cbae/notebook/(api/kernels|api/sessions|api/terminals|terminals)/ {
            rewrite ^/befcb3a2cbae/notebook/(.*)$ /notebook/$1 break;
            proxy_pass http://127.0.0.1:7777;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket支持（关键）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
        
        # 容器 befcb3a2cbae 的Notebook路径
        location /befcb3a2cbae/notebook/ {
            rewrite ^/befcb3a2cbae/notebook/(.*)$ /notebook/$1 break;
            proxy_pass http://127.0.0.1:7777;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 解决Notebook白屏问题的关键配置
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            
            # WebSocket支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
            
            # 处理重定向和路径
            proxy_redirect ~^/notebook/(.*) /befcb3a2cbae/notebook/$1;
            proxy_redirect http://127.0.0.1:7777/notebook/ /befcb3a2cbae/notebook/;
            proxy_redirect http://localhost:7777/notebook/ /befcb3a2cbae/notebook/;
            
            # 替换HTML内容中的相对路径
            sub_filter_once off;
            sub_filter 'src="/notebook/' 'src="/befcb3a2cbae/notebook/';
            sub_filter 'href="/notebook/' 'href="/befcb3a2cbae/notebook/';
            sub_filter '"/notebook/' '"/befcb3a2cbae/notebook/';
            sub_filter_types text/html;
        }

    }
}
